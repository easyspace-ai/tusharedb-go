
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平安银行 - 股票分析报告</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2E86AB 0%, #A23B72 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header .meta {
            display: flex; justify-content: center; gap: 30px;
            margin-top: 20px; flex-wrap: wrap;
        }
        .header .meta-item {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px; border-radius: 25px;
        }
        .section { padding: 40px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        .section-title {
            font-size: 1.8em; color: #2E86AB;
            margin-bottom: 25px; padding-bottom: 10px;
            border-bottom: 3px solid #2E86AB;
            display: flex; align-items: center;
        }
        .section-title::before {
            content: ''; display: inline-block;
            width: 8px; height: 30px; background: #2E86AB;
            margin-right: 15px; border-radius: 4px;
        }
        .core-conclusion {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; border-radius: 10px;
            margin-bottom: 30px;
        }
        .core-conclusion h2 { margin-bottom: 20px; font-size: 1.5em; }
        .conclusion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .conclusion-item {
            background: rgba(255,255,255,0.2);
            padding: 20px; border-radius: 10px; text-align: center;
        }
        .conclusion-item .label { font-size: 0.9em; opacity: 0.9; margin-bottom: 10px; }
        .conclusion-item .value { font-size: 2em; font-weight: bold; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
        }
        .chart-container {
            background: #f8f9fa; padding: 20px;
            border-radius: 10px; text-align: center;
        }
        .chart-container h3 { color: #2E86AB; margin-bottom: 15px; }
        .chart-container img {
            max-width: 100%; height: auto;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .footer {
            background: #f8f9fa; padding: 30px;
            text-align: center; color: #666;
            border-top: 1px solid #e0e0e0;
        }
        .disclaimer {
            background: #fff3cd; border: 1px solid #ffc107;
            padding: 20px; border-radius: 8px;
            margin-top: 20px; text-align: left;
        }
        .disclaimer strong { color: #856404; }
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>平安银行</h1>
            <div class="meta">
                <div class="meta-item">股票代码: 000001</div>
                <div class="meta-item">分析日期: 2026-03-27</div>
                <div class="meta-item">当前价格: 11.02 CNY</div>
                <div class="meta-item">数据来源: TDX(通达信)</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">核心结论</h2>
            <div class="core-conclusion">
                <h2>基于技术指标分析，该股当前处于反弹阶段，MACD出现金叉信号，建议谨慎关注</h2>
                <div class="conclusion-grid">
                    <div class="conclusion-item">
                        <div class="label">投资建议</div>
                        <div class="value">观望</div>
                    </div>
                    <div class="conclusion-item">
                        <div class="label">预期收益</div>
                        <div class="value">+5%</div>
                    </div>
                    <div class="conclusion-item">
                        <div class="label">最大风险</div>
                        <div class="value">-8%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">技术分析图表</h2>
            <div class="charts-grid">
                
                <div class="chart-container">
                    <h3>股价走势图</h3>
                    <img src="charts/000001_price_chart.png" alt="price_chart">
                </div>
                
                <div class="chart-container">
                    <h3>K线图与成交量</h3>
                    <img src="charts/000001_candlestick.png" alt="candlestick">
                </div>
                
                <div class="chart-container">
                    <h3>MACD指标</h3>
                    <img src="charts/000001_macd.png" alt="macd">
                </div>
                
                <div class="chart-container">
                    <h3>RSI指标</h3>
                    <img src="charts/000001_rsi.png" alt="rsi">
                </div>
                
            </div>
        </div>

        <div class="footer">
            <p>报告生成时间: 2026-03-27 17:38:59</p>
            <div class="disclaimer">
                <strong>免责声明：</strong>
                <p>本报告由AI分析系统基于TDX(通达信)数据生成，仅供参考，不构成任何投资建议。</p>
                <p>股票投资存在风险，市场有风险，投资需谨慎。</p>
            </div>
        </div>
    </div>
</body>
</html>
